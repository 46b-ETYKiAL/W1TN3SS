# W1TN3SS client release signing + provenance (plan-740 T5.1/T5.2).
#
# Signs the client release artifacts (the cargo-built binaries + the dump_syms
# symbol bundles) with:
#   * cosign KEYLESS  — GitHub Actions OIDC -> Fulcio short-lived cert -> Rekor
#     transparency log. No long-lived signing key to custody.
#   * SLSA v1 provenance (in-toto) — binds each artifact digest to the builder
#     identity + the source commit, via the official slsa-framework generator.
#   * minisign — the OFFLINE anchor kept from the plan-730 foundation. Both the
#     keyless signature and the minisign signature ship, so a verifier with no
#     Rekor/Fulcio access can still verify against the published minisign pubkey.
#
# A separate supply-chain gate (cargo-audit / cargo-vet / cargo-auditable) runs
# on every push + PR so a known-vuln or un-vetted dependency fails CI.
#
# The release job runs ONLY on a pushed `v*` tag (a real release). The
# supply-chain gate runs on every push/PR. The PR-required gate is `supply-chain`,
# which has NO `on.*.paths:` filter and NO conditional `if:`, so it always runs on
# every PR — there is no "skipped == success" footgun. The build/sign/provenance/
# verify jobs are deliberately tag-gated (`if: startsWith(github.ref,
# 'refs/tags/v')`) and are NOT PR-required, so their PR-time skip is correct, not
# a silent pass.

name: release-sign

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-sign-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Supply-chain gate: cargo-audit + cargo-vet + cargo-auditable.
  # Runs on every push + PR. A known-vuln dep (audit) or an un-vetted dep (vet)
  # fails the gate. cargo-auditable embeds the dependency tree into the shipped
  # binaries for post-hoc CVE attribution.
  # ---------------------------------------------------------------------------
  supply-chain:
    name: supply-chain (audit / vet / auditable)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        # SHA-pinned (dtolnay/rust-toolchain master); channel via `toolchain:`.
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master 2026-06-30
        with:
          toolchain: stable

      - name: Cache cargo registry + git
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install supply-chain tooling
        # cargo-audit is pinned to >= 0.22.0, the first release whose embedded
        # `rustsec` crate (>= 0.31) parses CVSS 4.0 advisory vectors. The prior
        # 0.21.2 pin chokes on any RustSec advisory carrying a `cvss = "CVSS:4.0/…"`
        # string ("unsupported CVSS version: 4.0"), which has failed this gate on
        # main since the advisory DB began publishing CVSS 4.0 entries. 0.22.2
        # (2026-06-05) is the current stable. No unpinned `|| cargo install …`
        # fallback: a failed pinned install must fail the gate, never silently
        # install an unpinned (possibly CVSS-4.0-broken) version (dependency-
        # management.md silent-drift rule).
        run: |
          cargo install cargo-audit --locked --version 0.22.2
          cargo install cargo-auditable --locked

      # cargo-audit: fail on any RUSTSEC advisory affecting the locked tree.
      - name: cargo-audit (known-vuln gate)
        run: cargo audit --deny warnings

      # cargo-vet: fail on any dependency that is not yet vetted. The supply-chain
      # config under supply-chain/ holds the audit set + trusted publishers.
      - name: Install cargo-vet
        run: cargo install cargo-vet --locked
      - name: cargo-vet (human-audited supply chain)
        # supply-chain/config.toml is committed, so vet always runs in --locked
        # gating mode. The bootstrap (init) branch is a hard error, not a silent
        # warn-and-pass: an unvetted dependency must fail the gate.
        run: |
          if [ ! -f supply-chain/config.toml ]; then
            echo "::error::supply-chain/config.toml is missing — the cargo-vet audit set is required"
            exit 1
          fi
          cargo vet --locked

      # cargo-auditable: prove the shipped binary can carry its own dependency
      # manifest for post-hoc CVE attribution. No `|| cargo build` fallback: if
      # the auditable build fails we must fail the gate rather than silently ship
      # a binary WITHOUT the embedded dependency manifest (the whole point).
      - name: cargo-auditable build (embed dep tree)
        run: cargo auditable build --release --workspace

  # ---------------------------------------------------------------------------
  # Build + sign the release artifacts. Tag-gated (only on `v*`).
  # Produces the cargo binaries, then signs each with cosign keyless + minisign,
  # and emits the digests an SLSA provenance step binds.
  # ---------------------------------------------------------------------------
  build-and-sign:
    name: build + sign release artifacts
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload release assets
      id-token: write # OIDC for cosign keyless + SLSA
    outputs:
      digests: ${{ steps.digest.outputs.digests }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        # SHA-pinned (dtolnay/rust-toolchain master); channel via `toolchain:`.
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master 2026-06-30
        with:
          toolchain: stable

      - name: Build release binaries (locked)
        run: cargo build --release --workspace --locked

      - name: Install cosign
        uses: sigstore/cosign-installer@d7d6bc7722e3daa8354c50bcb52f4837da5e9b6a # v3.7.0

      - name: Install minisign
        run: |
          sudo apt-get update
          sudo apt-get install -y minisign

      # Collect the artifacts to sign: every release binary + (when present) the
      # dump_syms symbol bundles. A poisoned symbol mis-symbolicates a crash, so
      # the symbol bundles are signed exactly like the binaries.
      - name: Stage artifacts
        id: stage
        run: |
          mkdir -p dist
          # Release binaries (skip build scripts / deps).
          find target/release -maxdepth 1 -type f -perm -u+x \
            ! -name "*.d" -exec cp {} dist/ \; || true
          # dump_syms symbol bundles, if a prior job produced them.
          find . -name "*.sym" -path "*symbols*" -exec cp {} dist/ \; || true
          ls -la dist/

      # Compute the SHA-256 digests SLSA provenance binds to the builder + source.
      - name: Compute digests
        id: digest
        run: |
          DIGESTS=$(cd dist && sha256sum * | base64 -w0)
          echo "digests=$DIGESTS" >> "$GITHUB_OUTPUT"
          (cd dist && sha256sum *) | tee dist.sha256

      # cosign KEYLESS: OIDC -> Fulcio short-lived cert -> Rekor. The signature
      # + cert are uploaded as release assets; verification is `cosign verify-blob`.
      - name: cosign keyless sign (blobs)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          for f in dist/*; do
            [ -f "$f" ] || continue
            cosign sign-blob --yes \
              --output-signature "$f.sig" \
              --output-certificate "$f.pem" \
              "$f"
          done

      # minisign OFFLINE anchor: a verifier with no Rekor/Fulcio access verifies
      # against the published minisign public key. The secret key is injected from
      # repo secrets, never committed.
      #
      # The presence check is done at RUNTIME in the script, NOT via a step-level
      # `if: ${{ env.MINISIGN_SECRET_KEY != '' }}`: a step's own `env:` block is
      # NOT in scope for that same step's `if:` (GitHub Actions evaluates `if`
      # before the step env is materialized), so the old `if` was always false and
      # this step silently never ran. Keeping the secret step-scoped (not hoisted
      # to job-level env) and gating inside the run avoids both the silent-skip and
      # widening the secret's blast radius across the job.
      - name: minisign sign (offline anchor)
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${MINISIGN_SECRET_KEY:-}" ]; then
            echo "::warning::MINISIGN_SECRET_KEY secret not set — skipping the offline minisign anchor (cosign keyless signatures still ship)."
            exit 0
          fi
          printf '%s' "$MINISIGN_SECRET_KEY" > minisign.key
          for f in dist/*; do
            case "$f" in *.sig|*.pem) continue;; esac
            [ -f "$f" ] || continue
            echo "${MINISIGN_PASSWORD:-}" | minisign -S -s minisign.key -m "$f" -x "$f.minisig"
          done
          rm -f minisign.key

      - name: Upload signed artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: signed-release
          path: |
            dist/**
            dist.sha256

  # ---------------------------------------------------------------------------
  # SLSA v1 provenance (in-toto) over the release artifact digests, via the
  # official slsa-framework generator. Tag-gated.
  # ---------------------------------------------------------------------------
  provenance:
    needs: [build-and-sign]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      actions: read
      contents: write
      id-token: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: ${{ needs.build-and-sign.outputs.digests }}
      upload-assets: true

  # ---------------------------------------------------------------------------
  # Verify the cosign keyless signatures against the Rekor entry — proves the
  # signing path is sound (the verify test in the plan's acceptance criteria).
  # Tag-gated.
  # ---------------------------------------------------------------------------
  verify:
    name: verify cosign signatures (Rekor)
    needs: [build-and-sign]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download signed artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: signed-release
          path: dist

      - name: Install cosign
        uses: sigstore/cosign-installer@d7d6bc7722e3daa8354c50bcb52f4837da5e9b6a # v3.7.0

      - name: Verify each blob signature against Rekor
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          fail=0
          for f in dist/*; do
            case "$f" in *.sig|*.pem|*.minisig) continue;; esac
            [ -f "$f" ] || continue
            echo "verifying $f"
            cosign verify-blob \
              --certificate "$f.pem" \
              --signature "$f.sig" \
              --certificate-identity-regexp "https://github.com/${GITHUB_REPOSITORY}/.*" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "$f" || fail=1
          done
          exit $fail

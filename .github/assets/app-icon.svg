<!-- Itasha Corp app icon — 1024×1024 — CRT-IC v5 demon-sigil app-icon family -->
<!-- The icon IS the central daemon-sigil, squared: void CRT plate + summoning -->
<!-- seal (containment ring + graticule + kanji band + kamea + 5 bind-runes) -->
<!-- around the per-repo M0 -16 L-5 -3 L2 -1 L-3 9 L2 16 M-15 -9 L-8 -5 M15 -9 L8 -5 M-15 9 L-8 5 M15 9 L8 5 M-7 13 A7 7 0 0 0 7 13 core glyph. Bold, master-tier seal. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="W1TN3SS app icon — Itasha Corp">
  <title>W1TN3SS app icon — demon-sigil (master tier)</title>
  <defs>
    <pattern id="ai-scan" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="#070a0c"/><rect width="16" height="3" fill="#f0eef5" opacity="0.04"/>
    </pattern>
    <radialGradient id="ai-vig" cx="50%" cy="46%" r="64%">
      <stop offset="0%" stop-color="#070a0c" stop-opacity="0"/><stop offset="76%" stop-color="#070a0c" stop-opacity="0"/><stop offset="100%" stop-color="#070a0c" stop-opacity="0.6"/>
    </radialGradient>
    <radialGradient id="ai-bloom" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b4ee3a" stop-opacity="0.26"/><stop offset="42%" stop-color="#b4ee3a" stop-opacity="0.1"/><stop offset="100%" stop-color="#b4ee3a" stop-opacity="0"/>
    </radialGradient>
    <filter id="ai-glow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur in="SourceGraphic" stdDeviation="3.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <path id="ai-ringOuter" d="M 0 -300 A 300 300 0 1 1 -0.05 -300" fill="none"/>
    <path id="ai-ringInner" d="M 0 -176 A 176 176 0 1 1 -0.05 -176" fill="none"/>
    <clipPath id="ai-clip"><rect x="80" y="80" width="864" height="864" rx="176"/></clipPath>
  </defs>
  <style>@media (prefers-reduced-motion: reduce) { * { animation: none !important; } }</style>

  <rect x="80" y="80" width="864" height="864" rx="176" fill="#070a0c"/>
  <g clip-path="url(#ai-clip)">
    <rect x="80" y="80" width="864" height="864" fill="url(#ai-scan)"/>
    <circle cx="512" cy="512" r="430" fill="url(#ai-bloom)"/>
    <rect x="80" y="80" width="864" height="864" fill="url(#ai-vig)"/>
  </g>

  <!-- plate keyline (the small-tier survivor) -->
  <rect x="80" y="80" width="864" height="864" rx="176" fill="none" stroke="#b4ee3a" stroke-width="10"/>

  <!-- ==== squared daemon-sigil seal, centred (512,512) ==== -->
  <g transform="translate(512,512)">
    <!-- faint kamea (magic-square) grid behind centre -->
    <g stroke="#b4ee3a" stroke-width="1.8" opacity="0.18">
      <line x1="-96" y1="-96" x2="96" y2="-96"/><line x1="-96" y1="-33" x2="96" y2="-33"/>
      <line x1="-96" y1="33" x2="96" y2="33"/><line x1="-96" y1="96" x2="96" y2="96"/>
      <line x1="-96" y1="-96" x2="-96" y2="96"/><line x1="-33" y1="-96" x2="-33" y2="96"/>
      <line x1="33" y1="-96" x2="33" y2="96"/><line x1="96" y1="-96" x2="96" y2="96"/>
    </g>
    <!-- outer kanji band on its own wide ring -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="72s" repeatCount="indefinite"/>
      <circle r="300" stroke="#b4ee3a" stroke-width="2" fill="none" opacity="0.4"/>
      <text font-size="46" fill="#b4ee3a" opacity="0.82" letter-spacing="10" font-family="'Noto Sans JP','Yu Gothic','Hiragino Sans',sans-serif">
        <textPath href="#ai-ringOuter" startOffset="3%">証言 · W1TN3SS · 証言 · W1TN3SS ·</textPath>
      </text>
    </g>
    <!-- outer containment ring + radial graticule -->
    <g stroke="#b4ee3a" fill="none">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="60s" repeatCount="indefinite"/>
      <circle r="248" stroke-width="6" opacity="0.95"/>
      <circle r="230" stroke-width="3.5" opacity="0.72"/>
      <g stroke-width="4.5" opacity="0.85">
        <line x1="0" y1="-248" x2="0" y2="-230"/><line x1="124" y1="-214.8" x2="115" y2="-199.2"/>
        <line x1="214.8" y1="-124" x2="199.2" y2="-115"/><line x1="248" y1="0" x2="230" y2="0"/>
        <line x1="214.8" y1="124" x2="199.2" y2="115"/><line x1="124" y1="214.8" x2="115" y2="199.2"/>
        <line x1="0" y1="248" x2="0" y2="230"/><line x1="-124" y1="214.8" x2="-115" y2="199.2"/>
        <line x1="-214.8" y1="124" x2="-199.2" y2="115"/><line x1="-248" y1="0" x2="-230" y2="0"/>
        <line x1="-214.8" y1="-124" x2="-199.2" y2="-115"/><line x1="-124" y1="-214.8" x2="-115" y2="-199.2"/>
      </g>
    </g>
    <!-- inner kanji band on a hidden ring (counter-rotates) -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="40s" repeatCount="indefinite"/>
      <text font-size="40" fill="#b4ee3a" opacity="0.85" font-family="'Noto Sans JP','Yu Gothic','Hiragino Sans',sans-serif">
        <textPath href="#ai-ringInner" startOffset="5%">証言 · W1TN3SS · 証言 ·</textPath>
      </text>
    </g>
    <!-- odd-count (5) bind-rune spikes from ring toward centre -->
    <g stroke="#b4ee3a" stroke-width="5" opacity="0.78" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 -221 L0 -121 M-11.5 -142 L0 -121 L11.5 -142"/>
      <path d="M210 -68 L115 -37.2 M107.7 -55.1 L115 -37.2 L98.1 -40.6"/>
      <path d="M129.8 178.6 L71.1 97.8 M74.8 117.5 L71.1 97.8 L53.6 103.6"/>
      <path d="M-129.8 178.6 L-71.1 97.8 M-53.6 103.6 L-71.1 97.8 L-74.8 117.5"/>
      <path d="M-210 -68 L-115 -37.2 M-98.1 -40.6 L-115 -37.2 L-107.7 -55.1"/>
    </g>
    <!-- central CORE GLYPH: per-repo domain monogram. scale 5.0 → ~±90px span; -->
    <!-- stroke 3 × 5.0 = 15px effective: a crisp line-figure, not a filled blob. -->
    <g stroke="#b4ee3a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="scale(5.0)" filter="url(#ai-glow)">
      <path d="M0 -16 L-5 -3 L2 -1 L-3 9 L2 16 M-15 -9 L-8 -5 M15 -9 L8 -5 M-15 9 L-8 5 M15 9 L8 5 M-7 13 A7 7 0 0 0 7 13" pathLength="200" stroke-dasharray="200" stroke-dashoffset="0">
        <animate attributeName="stroke-dashoffset" from="200" to="0" dur="2.4s" begin="0s" fill="freeze" calcMode="spline" keySplines="0.6 0 0.2 1"/>
      </path>
    </g>
    <!-- terminal pommel dots (goetic signature) -->
    <g fill="#b4ee3a">
      <circle cx="0" cy="-121" r="7"/><circle cx="0" cy="121" r="7"/><circle cx="-105" cy="0" r="6"/><circle cx="105" cy="0" r="6"/>
    </g>
  </g>
  <rect x="80" y="80" width="864" height="864" rx="176" fill="none" stroke="#1a242b" stroke-width="2"/>
</svg>
